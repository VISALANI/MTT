services:
  - type: web
    name: multilingual-ticket-translator
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn app:create_app --workers 2 --bind 0.0.0.0:$PORT --call
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
